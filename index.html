const SHEET_CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSUdKzUbn45ITZaee5gIGMV-Fi0GNyenOFK4GBnZ8FpdiDdIOYRnbkVpLmkpSqUESqxDxwtMJJh5U_m/pub?gid=1685528041&single=true&output=csv';

function parseCSVRow(line){
  const cols=[];let cur='',inQ=false;
  for(let i=0;i<line.length;i++){
    const ch=line[i];
    if(inQ){if(ch==='"'){if(line[i+1]==='"'){cur+='"';i++;}else inQ=false;}else cur+=ch;}
    else{if(ch==='"')inQ=true;else if(ch===','){cols.push(cur.trim());cur='';}else cur+=ch;}
  }
  cols.push(cur.trim());return cols;
}

function parseCSV(text){
  const lines=text.split(/\r?\n/).filter(l=>l.trim());
  if(lines.length<2)return[];
  const headers=parseCSVRow(lines[0]);
  return lines.slice(1).map(line=>{
    const vals=parseCSVRow(line);
    const obj={};headers.forEach((h,i)=>obj[h]=vals[i]||'');return obj;
  });
}

async function mergeSheetData(){
  if(SHEET_CSV_URL==='TU_URL_AQUI')return;
  try{
    const ctrl=new AbortController();
    const timer=setTimeout(()=>ctrl.abort(),3000);
    const resp=await fetch(SHEET_CSV_URL+'&t='+Math.floor(Date.now()/60000),{signal:ctrl.signal});
    clearTimeout(timer);
    const text=await resp.text();
    const rows=parseCSV(text);
    const map=new Map();
    rows.forEach(r=>{const n=parseInt(r['Nro Stand']);if(n)map.set(n,r);});
    ALL_STANDS.forEach(s=>{
      const r=map.get(s.n);if(!r)return;
      s.brand=r['Marca / Nombre']||'';
      s.rubro=r['Rubro']||'';
      s.desc=r['Descripcion']||'';
      s.instagram=(r['Instagram']||'').replace(/^@/,'');
      s.contacto=r['Contacto']||'';
    });
  }catch(e){/* degradación elegante: continuar sin datos */}
}

// ══════════════════════════════════════════
// RENDER
// ══════════════════════════════════════════
function svgEl(tag, attrs){
  const el=document.createElementNS('http://www.w3.org/2000/svg',tag);
  for(const[k,v] of Object.entries(attrs)) el.setAttribute(k,v);
  return el;
}

function renderRefs(svg, refs){
  refs.forEach(r=>{
    if(r.type==='zone'){
      svg.appendChild(svgEl('rect',{x:r.x,y:r.y,width:r.w,height:r.h,rx:5,fill:r.color,'fill-opacity':.25,stroke:r.color,'stroke-opacity':.4,class:'zone-bg'}));
      if(r.label){
        const t=svgEl('text',{x:r.lx||r.x+r.w/2, y:r.ly||r.y+r.h/2, class:'zone-label'});
        t.textContent=r.label; svg.appendChild(t);
      }
      if(r.sublabel){
        const t=svgEl('text',{x:r.lx||r.x+r.w/2, y:(r.ly||r.y+r.h/2)+(r.label?16:0), class:'zone-label-sm'});
        if(r.vertical) t.setAttribute('transform',`rotate(-90,${r.lx||r.x+r.w/2},${(r.ly||r.y+r.h/2)+(r.label?16:0)})`);
        t.textContent=r.sublabel; svg.appendChild(t);
      }
    }
    if(r.type==='ref'){
      svg.appendChild(svgEl('rect',{x:r.x,y:r.y,width:r.w,height:r.h,rx:3,class:'ref-rect'}));
      if(r.label){
        if(r.vertical){
          const t=svgEl('text',{x:r.x+r.w/2,y:r.y+r.h/2,class:'ref-label',transform:`rotate(-90,${r.x+r.w/2},${r.y+r.h/2})`});
          t.textContent=r.label; svg.appendChild(t);
        } else {
          const lines=r.label.split('\n');
          lines.forEach((line,i)=>{
            const t=svgEl('text',{x:r.x+r.w/2, y:r.y+r.h/2+(i-(lines.length-1)/2)*11, class:'ref-label'});
            t.textContent=line; svg.appendChild(t);
          });
        }
      }
    }
    if(r.type==='label'){
      const t=svgEl('text',{x:r.x,y:r.y,class:'ref-label','font-size':r.size||9});
      if(r.vertical) t.setAttribute('transform',`rotate(-90,${r.x},${r.y})`);
      t.textContent=r.text; svg.appendChild(t);
    }
  });
}

function renderStands(svg, stands){
  stands.forEach(s=>{
    const rect=svgEl('rect',{x:s.x,y:s.y,width:s.w,height:s.h,rx:3,fill:s.c,class:'stand','data-id':s.id});
    rect.addEventListener('click',()=>showInfo(s));
    svg.appendChild(rect);
    const fs=Math.min(s.w,s.h)*0.38;
    if(fs>=6){
      const t=svgEl('text',{x:s.x+s.w/2,y:s.y+s.h/2,class:'slabel','font-size':fs});
      t.textContent=s.n; svg.appendChild(t);
    }
  });
}

const svgPB=document.getElementById('svg-pb');
const svgP1=document.getElementById('svg-p1');
renderRefs(svgPB, REFS_PB);
renderRefs(svgP1, REFS_P1);

(async()=>{
  await mergeSheetData();
  renderStands(svgPB, PB);
  renderStands(svgP1, P1);
})();

// BOTTOM SHEET
// ══════════════════════════════════════════
const info=document.getElementById('info');
const overlay=document.getElementById('overlay');
let activeEl=null;

function showInfo(s){
  if(activeEl) activeEl.classList.remove('active');
  activeEl=document.querySelector(`[data-id="${s.id}"]`);
  if(activeEl) activeEl.classList.add('active');
  document.getElementById('si-num').textContent=`Stand #${s.n}`;
  document.getElementById('si-zone').textContent=`${s.zone} — ${s.fl==='pb'?'Planta Baja':'1er Piso'}`;
  document.getElementById('si-brand').textContent=s.brand||'';
  document.getElementById('si-desc').textContent=s.desc||(s.brand?'':'Sin datos aún');
  document.getElementById('si-rubro').textContent=s.rubro?`Rubro: ${s.rubro}`:'';
  const igEl=document.getElementById('si-instagram');
  if(s.instagram){const h=s.instagram.replace(/^@/,'');igEl.innerHTML=`<a href="https://instagram.com/${h}" target="_blank" rel="noopener">@${h}</a>`;}else{igEl.innerHTML='';}
  document.getElementById('si-contacto').textContent=s.contacto||'';
  info.classList.add('open');
  overlay.classList.add('open');
}

function closeInfo(){
  info.classList.remove('open');
  overlay.classList.remove('open');
  if(activeEl){activeEl.classList.remove('active');activeEl=null;}
}
overlay.addEventListener('click',closeInfo);
let ty=0;
info.addEventListener('touchstart',e=>{ty=e.touches[0].clientY;});
info.addEventListener('touchmove',e=>{if(e.touches[0].clientY-ty>40)closeInfo();});
</script>
